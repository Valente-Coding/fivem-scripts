<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Always visible HUD -->
    <div id="money-hud" class="money-hud">
        <div class="money-item cash">
            <span class="money-label">Money</span>
            <span class="money-value" id="hud-cash">$0</span>
        </div>
        <div class="money-item dirty">
            <span class="money-label">Dirty Money</span>
            <span class="money-value" id="hud-dirty">$0</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
