<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Drug Dealer</title>
</head>
<body>
    <div class="dealer-wrapper">
        <div id="dealer-container">
            <div class="dealer-header">
                <h1>Black Market</h1>
                <div class="close-btn" id="close-menu"><i class="fas fa-times"></i></div>
            </div>

            <div class="dealer-reputation">
                <div class="reputation-info">
                    <div class="level-badge">
                        <span id="player-level">1</span>
                    </div>
                    <div class="reputation-details">
                        <span class="reputation-title">Dealer Reputation</span>
                        <div class="progress-bar">
                            <div class="progress-fill" id="exp-bar"></div>
                        </div>
                        <span class="reputation-text" id="exp-text">0 / 100</span>
                    </div>
                </div>
            </div>

            <div class="dealer-content">
                <div class="dealer-tabs">
                    <div class="tab active" data-tab="all">All</div>
                    <div class="tab" data-tab="weed">Weed</div>
                    <div class="tab" data-tab="cocaine">Cocaine</div>
                    <div class="tab" data-tab="meth">Meth</div>
                </div>
                <div class="dealer-items" id="dealer-items"></div>
            </div>

            <div class="dealer-footer">
                <div class="player-money-container">
                    <div class="player-dirty-money">
                        <i class="fas fa-money-bill-wave"></i>
                        <span>Dirty: $<span id="dirty-money">0</span></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bulk Buy Panel (Level 5 only) -->
        <div id="bulk-buy-panel" style="display: none;">
            <div class="bulk-header">
                <h2><i class="fas fa-layer-group"></i> Bulk Order</h2>
                <div class="bulk-level-badge">LVL 5</div>
            </div>
            
            <div class="bulk-content">
                <div class="bulk-description">
                    Order all large packages at once
                </div>

                <div class="bulk-input-section">
                    <label>Quantity</label>
                    <div class="bulk-quantity-control">
                        <button class="bulk-qty-btn" id="bulk-qty-minus"><i class="fas fa-minus"></i></button>
                        <input type="number" id="bulk-quantity" value="1" min="1" max="100">
                        <button class="bulk-qty-btn" id="bulk-qty-plus"><i class="fas fa-plus"></i></button>
                    </div>
                </div>

                <div class="bulk-items-breakdown">
                    <div class="bulk-breakdown-title">You will receive:</div>
                    <div class="bulk-item">
                        <i class="fas fa-cannabis"></i>
                        <span id="bulk-weed-qty">1</span>x Large Weed
                    </div>
                    <div class="bulk-item">
                        <i class="fas fa-pills"></i>
                        <span id="bulk-cocaine-qty">1</span>x Large Cocaine
                    </div>
                    <div class="bulk-item">
                        <i class="fas fa-vial"></i>
                        <span id="bulk-meth-qty">1</span>x Large Meth
                    </div>
                </div>

                <div class="bulk-total">
                    <div class="bulk-total-label">Total Cost</div>
                    <div class="bulk-total-amount" id="bulk-total-cost">$0</div>
                </div>

                <button class="bulk-buy-button" id="bulk-buy-confirm">
                    <i class="fas fa-shopping-cart"></i> Purchase Bulk Order
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
</body>
</html>
