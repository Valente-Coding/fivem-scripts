<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Dealership</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Feedback Message Banner (Hidden by default) -->
    <div class="feedback-message" id="feedback-message" style="display: none;"></div>
    
    <!-- Main Dealership Container -->
    <div class="dealership-container" id="dealership-container">
        <!-- Header -->
        <div class="dealership-header">
            <h1 class="header-title">VEHICLE DEALERSHIP</h1>
            <button class="close-btn" id="close-btn" aria-label="Close">✕</button>
        </div>
        
        <!-- Category Filter Bar -->
        <div class="category-bar">
            <div class="category-label">CATEGORIES:</div>
            <div class="category-tabs" id="category-tabs">
                <!-- Tabs generated dynamically by JavaScript -->
            </div>
        </div>
        
        <!-- Main Content: Two-Panel Layout -->
        <div class="dealership-content">
            <!-- Left Panel: Vehicle List -->
            <div class="vehicle-list-panel">
                <div class="panel-label">AVAILABLE VEHICLES</div>
                <div class="vehicle-list" id="vehicle-list">
                    <!-- Vehicle items will be dynamically generated by script.js -->
                </div>
            </div>
            
            <!-- Right Panel: Vehicle Details -->
            <div class="vehicle-details-panel">
                <div class="details-content" id="details-content">
                    <!-- Initial state: No vehicle selected -->
                    <div class="no-selection">
                        <p>Select a vehicle to view details</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
