<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="job-menu" class="hidden">
        <div class="menu-header">
            <h1>WAREHOUSE JOB</h1>
            <span class="close-btn" id="menuCloseBtn">&times;</span>
        </div>
        <div class="menu-body">
            <div class="stat-row"><span>Level</span><span id="menuLevel">1</span></div>
            <div class="stat-row"><span>Jobs Done</span><span id="menuJobs">0</span></div>
            <div class="stat-row"><span>Boxes Carried</span><span id="menuBoxes">0</span></div>
            <div class="stat-row"><span>Total Earnings</span><span id="menuEarnings">$0</span></div>
            <div class="stat-row"><span>Next Level In</span><span id="menuNextLevel">5 jobs</span></div>
            <div class="stat-row"><span>Jobs Today</span><span id="menuDailyJobs">0/5</span></div>
            <button class="start-btn" id="startBtn">START JOB</button>
        </div>
    </div>

    <div id="job-hud" class="hidden">
        <div class="hud-title">WAREHOUSE</div>
        <div class="hud-row"><span>Level</span><span id="hudLevel">1</span></div>
        <div class="hud-row"><span>Time Left</span><span id="hudTimer">15:00</span></div>
        <div class="hud-row"><span>Boxes</span><span id="hudBoxes">0/5</span></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
