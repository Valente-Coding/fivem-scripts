<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="inventory-container" class="hidden">
        <div class="inv-header">
            <h1>INVENTORY</h1>
            <span class="hint">Press <kbd>F2</kbd> or <kbd>ESC</kbd> to close</span>
            <span class="close-btn" id="closeBtn">&times;</span>
        </div>
        <div class="inv-categories" id="categoryTabs"></div>
        <div class="inv-grid" id="itemGrid">
            <div class="empty-msg" id="emptyMsg">Your inventory is empty</div>
        </div>
    </div>
    <!-- Confirmation Modal -->
    <div id="confirmModal" class="modal hidden">
        <div class="modal-content">
            <h2>Delete Item?</h2>
            <p id="confirmMessage">Are you sure you want to delete this item?</p>
            <div class="modal-buttons">
                <button class="btn-confirm" id="confirmYes">Delete</button>
                <button class="btn-cancel" id="confirmNo">Cancel</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
